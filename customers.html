<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理系统 - 客户管理</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#3b82f6',
                        accent: '#60a5fa',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        light: '#f3f4f6',
                        dark: '#1f2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-gradient-primary {
                background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            }
            .card-shadow {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .transition-all-300 {
                transition: all 0.3s ease;
            }
            .sidebar-active {
                border-left: 4px solid #3b82f6;
                background-color: rgba(59, 130, 246, 0.1);
            }
            .status-badge {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium;
            }
            .status-high {
                @apply bg-blue-100 text-blue-800;
            }
            .status-normal {
                @apply bg-green-100 text-green-800;
            }
            .status-low {
                @apply bg-yellow-100 text-yellow-800;
            }
            .status-vip {
                @apply bg-purple-100 text-purple-800;
            }
            .customer-status-unclosed {
                @apply bg-yellow-100 text-yellow-800;
            }
            .customer-status-following {
                @apply bg-blue-100 text-blue-800;
            }
            .customer-status-closed {
                @apply bg-green-100 text-green-800;
            }
            .customer-status-paused {
                @apply bg-gray-100 text-gray-800;
            }
            .customer-status-lost {
                @apply bg-red-100 text-red-800;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-white w-64 shadow-lg hidden md:block transition-all-300">
            <div class="p-4 border-b">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-gradient-primary flex items-center justify-center text-white">
                        <i class="fa fa-users"></i>
                    </div>
                    <h1 class="ml-3 text-lg font-bold text-gray-800" data-lang="systemTitle">客户管理系统</h1>
                </div>
            </div>
            
            <div class="py-4">
                <div class="px-4 py-2 text-xs text-gray-600 uppercase tracking-wider" data-lang="mainMenu">
                    主菜单
                </div>
                <nav>
                    <a href="dashboard.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-dashboard w-6 text-gray-500"></i>
                        <span data-lang="dashboard">仪表盘</span>
                    </a>
                    <a href="customers.html" class="flex items-center px-4 py-3 text-gray-700 sidebar-active">
                        <i class="fa fa-users w-6 text-gray-500"></i>
                        <span data-lang="customerManagement">客户管理</span>
                    </a>
                    <a href="sales.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-shopping-cart w-6 text-gray-500"></i>
                        <span data-lang="salesManagement">销售管理</span>
                    </a>
                    <a href="delivery.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-truck w-6 text-gray-500"></i>
                        <span data-lang="deliveryManagement">交付管理</span>
                    </a>
                    <a href="renewal.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-refresh w-6 text-gray-500"></i>
                        <span data-lang="renewalManagement">续费管理</span>
                    </a>
                    <a href="finance.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-money w-6 text-gray-500"></i>
                        <span data-lang="financeManagement">财务管理</span>
                    </a>
                    <a href="tasks.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-tasks w-6 text-gray-500"></i>
                        <span data-lang="taskCollaboration">任务协作</span>
                    </a>
                    <a href="reports.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-bar-chart w-6 text-gray-500"></i>
                        <span data-lang="reportCenter">报表中心</span>
                    </a>
                </nav>
                
                <div class="px-4 py-2 mt-4 text-xs text-gray-600 uppercase tracking-wider" data-lang="system">
                    系统
                </div>
                <nav>
                    <a href="settings.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-cog w-6 text-gray-500"></i>
                        <span data-lang="systemSettings">系统设置</span>
                    </a>
                    <a href="#" id="logout-btn" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-sign-out w-6 text-gray-500"></i>
                        <span data-lang="logout">退出登录</span>
                    </a>
                </nav>
            </div>
        </aside>
        
        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Navigation -->
            <header class="bg-white shadow-sm z-10">
                <div class="flex items-center justify-between p-4">
                    <div class="flex items-center">
                            <button id="sidebar-toggle" class="text-gray-500 focus:outline-none md:hidden">
                                <i class="fa fa-bars text-xl"></i>
                            </button>
                            <h2 class="ml-2 text-xl font-semibold text-gray-800" data-lang="customerManagement">客户管理</h2>
                        </div>
                        
                        <div class="flex items-center ml-4">
                            <button id="lang-zh" class="px-3 py-1 rounded-l-md bg-primary text-white">中文</button>
                            <button id="lang-en" class="px-3 py-1 rounded-r-md bg-gray-200 text-gray-700">English</button>
                        </div>
                    
                    <div class="flex items-center">
                        <div class="relative mr-4">
                            <button class="text-gray-500 focus:outline-none">
                                <i class="fa fa-bell text-xl"></i>
                                <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
                            </button>
                        </div>
                        
                        <div class="relative">
                            <button id="user-menu-button" class="flex items-center text-gray-700 focus:outline-none">
                                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center">
                                    <span id="user-initial">管</span>
                                </div>
                                <span class="ml-2 text-sm font-medium" id="user-name">管理员</span>
                                <i class="fa fa-chevron-down ml-1 text-xs"></i>
                            </button>
                            
                            <div id="user-menu" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 hidden">
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fa fa-user mr-2"></i> <span data-lang="personalProfile">个人资料</span>
                                </a>
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fa fa-cog mr-2"></i> <span data-lang="accountSettings">账户设置</span>
                                </a>
                                <div class="border-t border-gray-200"></div>
                                <a href="#" id="user-menu-logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fa fa-sign-out mr-2"></i> <span data-lang="logout">退出登录</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Main Content Area -->
            <main class="flex-1 overflow-y-auto p-4 bg-gray-100">
                <!-- Action Bar -->
                <div class="bg-white rounded-lg shadow-sm p-4 mb-6">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between">
                        <div class="flex items-center mb-4 md:mb-0">
                            <button id="add-customer-btn" class="bg-primary hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-all-300 flex items-center">
                                <i class="fa fa-plus mr-2"></i> <span data-lang="addCustomer">添加客户</span>
                            </button>
                            <button id="debug-btn" class="ml-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded-md transition-all-300 flex items-center">
                                <i class="fa fa-bug mr-2"></i> 调试
                            </button>
                            <div class="ml-3 relative">
                                <button id="batch-actions-btn" class="bg-white border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-md hover:bg-gray-50 transition-all-300 flex items-center">
                                    <i class="fa fa-cog mr-2"></i> <span data-lang="batchActions">批量操作</span>
                                    <i class="fa fa-chevron-down ml-2 text-xs"></i>
                                </button>
                                <div id="batch-actions-menu" class="absolute left-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 hidden z-10">
                                    <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                        <i class="fa fa-download mr-2"></i> <span data-lang="exportSelected">导出选中</span>
                                    </a>
                                    <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                        <i class="fa fa-print mr-2"></i> <span data-lang="printSelected">打印选中</span>
                                    </a>
                                    <div class="border-t border-gray-200"></div>
                                    <a href="#" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
                                        <i class="fa fa-trash mr-2"></i> <span data-lang="deleteSelected">删除选中</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex items-center">
                            <div class="relative">
                                <input type="text" id="search-input" data-lang="searchPlaceholder" placeholder="搜索客户名称、联系人..." class="w-full md:w-64 pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa fa-search text-gray-400"></i>
                                </div>
                            </div>
                            <button id="filter-btn" class="ml-3 bg-white border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-md hover:bg-gray-50 transition-all-300 flex items-center">
                                <i class="fa fa-filter mr-2"></i> <span data-lang="filter">筛选</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Filter Panel (Hidden by default) -->
                <div id="filter-panel" class="bg-white rounded-lg shadow-sm p-4 mb-6 hidden">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-lang="customerStatus">客户状态</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="" data-lang="allStatus">全部状态</option>
                                <option value="unclosed" data-lang="unclosed">未成交</option>
                                <option value="following" data-lang="following">跟进中</option>
                                <option value="closed" data-lang="closed">已成交</option>
                                <option value="paused" data-lang="paused">暂停</option>
                                <option value="lost" data-lang="lost">流失</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-lang="salesPerson">负责人</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="" data-lang="allSalesPersons">全部负责人</option>
                                <option value="1">张三</option>
                                <option value="2">李四</option>
                                <option value="3">王五</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-lang="industryType">行业类型</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="" data-lang="allIndustries">全部行业</option>
                                <option value="restaurant" data-lang="restaurant">餐厅</option>
                                <option value="nail" data-lang="nail">美甲</option>
                                <option value="massage" data-lang="massage">按摩</option>
                                <option value="beauty" data-lang="beauty">美容</option>
                                <option value="supermarket" data-lang="supermarket">超市</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-lang="customerLevel">客户等级</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="" data-lang="allLevels">全部等级</option>
                                <option value="high" data-lang="high">高意向</option>
                                <option value="normal" data-lang="normal">普通</option>
                                <option value="low" data-lang="low">低意向</option>
                                <option value="vip" data-lang="vip">VIP</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-lang="city">城市</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="" data-lang="allCities">全部城市</option>
                                <option value="ny">纽约</option>
                                <option value="la">洛杉矶</option>
                                <option value="sf">旧金山</option>
                                <option value="chicago">芝加哥</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-lang="createdAt">创建时间</label>
                            <div class="flex items-center space-x-2">
                                <input type="date" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <span>至</span>
                                <input type="date" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex justify-end space-x-3">
                        <button class="bg-white border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-md hover:bg-gray-50 transition-all-300" data-lang="reset">
                            重置
                        </button>
                        <button class="bg-primary hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-all-300" data-lang="applyFilter">
                            应用筛选
                        </button>
                    </div>
                </div>
                
                <!-- Customer List -->
                <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        <div class="flex items-center">
                                            <input id="select-all" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                                        </div>
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-lang="customerNumber">
                                        客户编号
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-lang="businessName">
                                        商家名称
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-lang="contactPerson">
                                        联系人
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-lang="phone">
                                        电话
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-lang="industry">
                                        行业
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-lang="salesPerson">
                                        负责人
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-lang="level">
                                        等级
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-lang="status">
                                        状态
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-lang="createdAt">
                                        创建时间
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider" data-lang="action">
                                        操作
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200" id="customer-table-body">
                                <!-- Customer rows will be inserted here by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Pagination -->
                    <div class="bg-white px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
                        <div class="flex-1 flex justify-between sm:hidden">
                            <a href="#" class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50" data-lang="previousPage">
                                上一页
                            </a>
                            <a href="#" class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50" data-lang="nextPage">
                                下一页
                            </a>
                        </div>
                        <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                            <div>
                                <p class="text-sm text-gray-700" data-lang="showingRecords">
                                    显示 <span class="font-medium">1</span> 到 <span class="font-medium">10</span> 条，共 <span class="font-medium">42</span> 条记录
                                </p>
                            </div>
                            <div>
                                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                                    <a href="#" class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                        <span class="sr-only" data-lang="previousPage">上一页</span>
                                        <i class="fa fa-chevron-left"></i>
                                    </a>
                                    <a href="#" aria-current="page" class="z-10 bg-primary border-primary text-white relative inline-flex items-center px-4 py-2 border text-sm font-medium">
                                        1
                                    </a>
                                    <a href="#" class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium">
                                        2
                                    </a>
                                    <a href="#" class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium">
                                        3
                                    </a>
                                    <span class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700">
                                        ...
                                    </span>
                                    <a href="#" class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium">
                                        5
                                    </a>
                                    <a href="#" class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                        <span class="sr-only" data-lang="nextPage">下一页</span>
                                        <i class="fa fa-chevron-right"></i>
                                    </a>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Add Customer Modal (Hidden by default) -->
    <div id="add-customer-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between p-6 border-b">
                <h3 class="text-lg font-semibold text-gray-800" data-lang="addNewCustomer">添加新客户</h3>
                <button id="close-modal-btn" class="text-gray-400 hover:text-gray-500 focus:outline-none">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            
            <div class="p-6">
                <form id="add-customer-form">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-lang="businessNameRequired">商家名称 <span class="text-red-500">*</span></label>
                            <input type="text" name="businessName" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-lang="contactPersonRequired">联系人 <span class="text-red-500">*</span></label>
                            <input type="text" name="contactPerson" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                        </div>
                        
                        <div>

        // 添加客户
        function addCustomer(customerData) {
            try {
                // 生成客户编号
                const customerNumber = 'C' + new Date().getFullYear() + String(Date.now()).slice(-6);
                
                // 创建新客户对象
                const newCustomer = {
                    id: customers.length > 0 ? Math.max(...customers.map(c => parseInt(c.id))) + 1 : 1,
                    customerNumber: customerNumber,
                    businessName: customerData.businessName,
                    contactPerson: customerData.contactPerson,
                    phone: customerData.phone,
                    wechatWhatsapp: customerData.wechatWhatsapp,
                    email: customerData.email,
                    industry: customerData.industryType,
                    country: customerData.country,
                    state: customerData.state,
                    city: customerData.cityLabel,
                    zipCode: customerData.zipCode,
                    businessAddress: customerData.businessAddress,
                    customerSource: customerData.customerSource,
                    salesPerson: customerData.salesPersonLabel,
                    operationsPerson: customerData.operationsPersonLabel,
                    designPerson: customerData.designPersonLabel,

                customer.customerSource = document.getElementById('edit-customerSource').value;
                customer.salesPerson = document.getElementById('edit-salesPerson').value;
                customer.operationsPerson = document.getElementById('edit-operationsPerson').value;
                customer.designPerson = document.getElementById('edit-designPerson').value;
                customer.level = document.getElementById('edit-level').value;
                customer.status = document.getElementById('edit-status').value;
                customer.hasOrderingSystem = document.querySelector('input[name="edit-hasOrderingSystem"]:checked').value === 'true';
                customer.currentPlatform = document.getElementById('edit-currentPlatform').value;
                customer.monthlyOrders = document.getElementById('edit-monthlyOrders').value;
                customer.notes = document.getElementById('edit-notes').value;
                
                // 保存到本地存储
                console.log('保存到本地存储');
                localStorage.setItem('customers', JSON.stringify(customers));
                console.log('保存成功');
                
                alert('客户信息更新成功！');
                
                // 重新加载客户详情
                console.log('重新加载客户详情');
                viewCustomer(index);
                
            } catch (error) {
                console.error('Error saving customer changes:', error);
                alert('保存客户信息失败: ' + error.message);
            }
        }
        
        // 取消编辑
        function cancelEdit() {
            try {
                const index = window.currentCustomerIndex;
                viewCustomer(index);
            } catch (error) {
                console.error('Error canceling edit:', error);
                alert('取消编辑失败: ' + error.message);
            }
        }
        
        // 编辑客户
        function editCustomer(index) {
            try {
                const customer = customers[index];
                
                if (!customer) {
                    alert('客户不存在');
                    return;
                }
                
                // 打开客户详情模态框并切换到编辑模式
                viewCustomer(index);
                // 这里可以添加额外的编辑逻辑
            } catch (error) {
                console.error('Error editing customer:', error);
                alert('编辑客户失败: ' + error.message);
            }
        }
        
        // 删除客户
        function deleteCustomer(index) {
            if (!confirm('确定要删除这个客户吗？')) {
                return;
            }
            
            try {
                // 从客户列表中删除
                customers.splice(index, 1);
                
                // 保存到本地存储
                localStorage.setItem('customers', JSON.stringify(customers));
                
                alert('客户删除成功！');
                loadCustomers();
            } catch (error) {
                console.error('Error deleting customer:', error);
                alert('删除客户失败: ' + error.message);
            }
        }
        

        

        
        // 退出登录
        document.getElementById('logout-btn').addEventListener('click', function(e) {
            e.preventDefault();
            logout();
        });
        
        document.getElementById('user-menu-logout').addEventListener('click', function(e) {
            e.preventDefault();
            logout();
        });
        
        function logout() {
            localStorage.removeItem('userLogin');
            sessionStorage.removeItem('userLogin');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
