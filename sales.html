        @layer utilities {

    <!-- Add Lead Modal (Hidden by default) -->
    <div id="add-lead-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl">

                            取消
                        </button>

    <script>
        // 检查登录状态
        document.addEventListener('DOMContentLoaded', function() {
            const savedLogin = localStorage.getItem('userLogin') || sessionStorage.getItem('userLogin');
            
            if (!savedLogin) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const userData = JSON.parse(savedLogin);
                
                // 更新用户信息
                document.getElementById('user-name').textContent = userData.name;
                document.getElementById('user-initial').textContent = userData.name.charAt(0);
                
                // 加载销售线索数据
                loadSalesLeads();
                // 加载跟进记录数据
                loadFollowupRecords();
                // 加载成交记录数据
                loadSalesDeals();
                
                // 初始化标签页切换
                initTabs();
                
            } catch (e) {
                console.error('登录信息解析错误', e);
                window.location.href = 'index.html';
            }
        });
        
        // 初始化标签页切换
        function initTabs() {
            const tabLinks = document.querySelectorAll('[data-tab]');
            
            tabLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    const tab = this.getAttribute('data-tab');
                    
                    // 移除所有标签页的活动状态
                    tabLinks.forEach(link => {
                        link.classList.remove('sales-tab-active', 'border-primary', 'text-primary');
                        link.classList.add('border-transparent', 'text-gray-500', 'hover:text-gray-700', 'hover:border-gray-300');
                    });
                    
                    // 添加当前标签页的活动状态
                    this.classList.remove('border-transparent', 'text-gray-500', 'hover:text-gray-700', 'hover:border-gray-300');
                    this.classList.add('sales-tab-active', 'border-primary', 'text-primary');
                    
                    // 隐藏所有标签内容
                    const tabContents = document.querySelectorAll('.tab-content');
                    tabContents.forEach(content => {
                        content.classList.add('hidden');
                    });
                    
                    // 显示当前标签内容
                    document.getElementById(`${tab}-tab`).classList.remove('hidden');
                });
            });
        }
        
        // 加载跟进记录数据
        function loadFollowupRecords() {
            const tableBody = document.getElementById('followup-table-body');
            tableBody.innerHTML = '';
            
            try {
                // 从本地存储获取跟进记录数据
                followupRecords = JSON.parse(localStorage.getItem('followupRecords')) || [];
                
                // 跟进方式映射
                const methodMap = {
                    'phone': '电话',
                    'wechat': '微信',
                    'sms': '短信',
                    'email': '邮件'
                };
                
                followupRecords.forEach(record => {
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td class="px-6 py-4">
                            <div class="text-sm text-gray-900 font-medium">${record.customerName}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${record.followupPerson}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${methodMap[record.method] || record.method}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-sm text-gray-900">${record.content}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${new Date(record.followupTime).toISOString().split('T')[0]}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${record.nextFollowup ? new Date(record.nextFollowup).toISOString().split('T')[0] : '-'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <a href="#" class="text-primary hover:text-secondary mr-3" onclick="viewFollowup(${record.id})">查看</a>
                            <a href="#" class="text-red-600 hover:text-red-900" onclick="deleteFollowup(${record.id})">删除</a>
                        </td>
                    `;
                    
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('加载跟进记录时出错:', error);
            }
        }
        
        // 加载成交记录数据
        function loadSalesDeals() {
            const tableBody = document.getElementById('deals-table-body');
            tableBody.innerHTML = '';
            
            try {
                // 从本地存储获取成交记录数据
                salesDeals = JSON.parse(localStorage.getItem('salesDeals')) || [];
                
                // 付款状态映射
                const statusMap = {
                    'pending': '待付款',
                    'paid': '已付款',
                    'partial': '部分付款'
                };
                
                salesDeals.forEach(deal => {
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td class="px-6 py-4">
                            <div class="text-sm text-gray-900 font-medium">${deal.customerName}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900 font-medium">¥${deal.amount.toFixed(2)}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${new Date(deal.dealDate).toISOString().split('T')[0]}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${deal.salesPerson}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="status-badge ${deal.paymentStatus === 'paid' ? 'stage-closed' : deal.paymentStatus === 'pending' ? 'stage-pending' : 'stage-consider'}">
                                ${statusMap[deal.paymentStatus] || deal.paymentStatus}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <a href="#" class="text-primary hover:text-secondary mr-3" onclick="viewDeal(${deal.id})">查看</a>
                            <a href="#" class="text-gray-600 hover:text-gray-900 mr-3" onclick="editDeal(${deal.id})">编辑</a>
                            <a href="#" class="text-red-600 hover:text-red-900" onclick="deleteDeal(${deal.id})">删除</a>
                        </td>
                    `;
                    
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('加载成交记录时出错:', error);
            }
        }
        
        // 加载销售线索数据
        function loadSalesLeads() {
            const tableBody = document.getElementById('leads-table-body');
            tableBody.innerHTML = '';
            
            try {
                // 从本地存储获取销售线索数据
                salesLeads = JSON.parse(localStorage.getItem('salesLeads')) || [];
                
                // 阶段映射
                const stageMap = {
                    'new': '新线索',
                    'contact': '已联系',
                    'communicate': '沟通中',
                    'quote': '已报价',
                    'consider': '考虑中',
                    'pending': '待成交',
                    'closed': '已成交',
                    'lost': '未成交',
                    'followup': '后续再跟进'
                };
                
                salesLeads.forEach(lead => {
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <input type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-sm text-gray-900 font-medium">${lead.customerName}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${lead.contactPerson}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${lead.phone}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${lead.salesPerson}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="status-badge stage-${lead.stage}">${stageMap[lead.stage] || lead.stage}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${lead.probability}%</div>
                            <div class="w-full bg-gray-200 rounded-full h-1.5 mt-1">
                                <div class="bg-primary h-1.5 rounded-full" style="width: ${lead.probability}%"></div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${lead.lastFollowup ? new Date(lead.lastFollowup).toISOString().split('T')[0] : '-'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${lead.nextFollowup ? `<span class="text-${isDateApproaching(lead.nextFollowup) ? 'red' : 'gray'}-500">${new Date(lead.nextFollowup).toISOString().split('T')[0]}</span>` : '-'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <a href="#" class="text-primary hover:text-secondary mr-3" onclick="viewLead(${lead.id})">查看</a>
                            <a href="#" class="text-gray-600 hover:text-gray-900 mr-3" onclick="editLead(${lead.id})">编辑</a>
                            <a href="#" class="text-green-600 hover:text-green-900" onclick="followupLead(${lead.id})">跟进</a>
                            <a href="#" class="text-red-600 hover:text-red-900 ml-3" onclick="deleteLead(${lead.id})">删除</a>
                        </td>
                    `;
                    
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('加载销售线索时出错:', error);
            }
        }
        
        // 检查日期是否临近（7天内）
        function isDateApproaching(dateString) {
            const today = new Date();
            const targetDate = new Date(dateString);
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays >= 0 && diffDays <= 7;
        }
        
        // 添加销售线索
        function addLead(leadData) {
            try {
                // 负责人映射
                const salesPersonMap = {
                    '1': '张三',
                    '2': '李四',
                    '3': '王五'
                };
                
                // 生成唯一ID
                const newId = salesLeads.length > 0 ? Math.max(...salesLeads.map(lead => lead.id)) + 1 : 1;
                
                const newLead = {
                    id: newId,
                    customerName: leadData.customerName,
                    contactPerson: leadData.contactPerson,
                    phone: leadData.phone,
                    email: leadData.email || null,
                    source: leadData.source || null,
                    salesPerson: salesPersonMap[leadData.salesPerson] || '未分配',
                    stage: leadData.stage || 'new',
                    probability: parseInt(leadData.probability) || 10,
                    nextFollowup: leadData.nextFollowup ? new Date(leadData.nextFollowup).toISOString() : null,
                    followupMethod: leadData.followupMethod || null,
                    needs: leadData.needs || null,
                    painPoints: leadData.painPoints || null,
                    notes: leadData.notes || null,
                    lastFollowup: null,
                    createdAt: new Date().toISOString()
                };
                
                // 添加到数组
                salesLeads.push(newLead);
                
                // 保存到本地存储
                localStorage.setItem('salesLeads', JSON.stringify(salesLeads));
                
                return newLead;
            } catch (error) {
                console.error('添加销售线索失败:', error);
                throw error;
            }
        }
        
        // 查看销售线索
        function viewLead(id) {
            try {
                const lead = salesLeads.find(lead => lead.id === id);
                
                if (!lead) {
                    throw new Error('线索不存在');
                }
                
                // 显示详情模态框
                alert('查看线索详情: ' + lead.customerName);
                console.log('线索详情:', lead);
            } catch (error) {
                console.error('查看销售线索失败:', error);
            }
        }
        
        // 编辑销售线索
        function editLead(id) {
            try {
                const lead = salesLeads.find(lead => lead.id === id);
                
                if (!lead) {
                    throw new Error('线索不存在');
                }
                
                // 显示编辑模态框
                alert('编辑线索: ' + lead.customerName);
                console.log('编辑线索:', lead);
            } catch (error) {
                console.error('编辑销售线索失败:', error);
            }
        }
        
        // 跟进销售线索
        function followupLead(id) {
            try {
                const leadIndex = salesLeads.findIndex(lead => lead.id === id);
                
                if (leadIndex === -1) {
                    throw new Error('线索不存在');
                }
                
                // 更新跟进信息
                salesLeads[leadIndex].lastFollowup = new Date().toISOString();
                salesLeads[leadIndex].stage = 'communicate';
                
                // 保存到本地存储
                localStorage.setItem('salesLeads', JSON.stringify(salesLeads));
                
                // 重新加载数据
                loadSalesLeads();
                alert('跟进成功！');
            } catch (error) {
                console.error('跟进销售线索失败:', error);
            }
        }
        
        // 删除销售线索
        function deleteLead(id) {
            if (!confirm('确定要删除这条线索吗？')) {
                return;
            }
            
            try {
                const leadIndex = salesLeads.findIndex(lead => lead.id === id);
                
                if (leadIndex === -1) {
                    throw new Error('线索不存在');
                }
                
                // 从数组中删除
                salesLeads.splice(leadIndex, 1);
                
                // 保存到本地存储
                localStorage.setItem('salesLeads', JSON.stringify(salesLeads));
                
                // 重新加载数据
                loadSalesLeads();
                alert('删除成功！');

        });

            const modal = document.getElementById('add-lead-modal');

        });
        
        // 点击模态框外部关闭
        document.getElementById('add-lead-modal').addEventListener('click', function(event) {
            if (event.target === this) {
                this.classList.add('hidden');
            }
        });
        
        // 添加线索表单提交
        document.getElementById('add-lead-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // 获取表单数据
            const formData = new FormData(this);
            const leadData = {
                customerName: formData.get('customerName'),
                contactPerson: formData.get('contactPerson'),
                phone: formData.get('phone'),
                email: formData.get('email'),
                source: formData.get('source'),
                salesPerson: formData.get('salesPerson'),
                stage: formData.get('stage'),
                probability: formData.get('probability'),
                nextFollowup: formData.get('nextFollowup'),
                followupMethod: formData.get('followupMethod'),
                needs: formData.get('needs'),
                painPoints: formData.get('painPoints'),
                notes: formData.get('notes')
            };
            
            try {
                // 添加线索
                addLead(leadData);
                
                // 重新加载线索列表
                loadSalesLeads();
                
                // 显示成功消息
                alert('线索添加成功！');
                
                // 关闭模态框
                document.getElementById('add-lead-modal').classList.add('hidden');
                
                // 重置表单
                this.reset();
            } catch (error) {
                console.error('添加线索失败:', error);
                alert('添加线索失败，请重试。');
            }
        });

            logout();

        // 添加跟进记录
        function addFollowupRecord(recordData) {
            try {
                // 生成唯一ID
                const newId = followupRecords.length > 0 ? Math.max(...followupRecords.map(record => record.id)) + 1 : 1;
                
                const newRecord = {
                    id: newId,
                    customerName: recordData.customerName,
                    followupPerson: recordData.followupPerson,
                    method: recordData.method,
                    content: recordData.content,
                    followupTime: new Date().toISOString(),
                    nextFollowup: recordData.nextFollowup ? new Date(recordData.nextFollowup).toISOString() : null,
                    leadId: recordData.leadId
                };
                
                // 添加到数组
                followupRecords.push(newRecord);
                
                // 保存到本地存储
                localStorage.setItem('followupRecords', JSON.stringify(followupRecords));
                
                return newRecord;
            } catch (error) {
                console.error('添加跟进记录失败:', error);
                throw error;
            }
        }

                console.error('删除跟进记录失败:', error);

        }
        
        // 添加成交记录
        function addSalesDeal(dealData) {
            try {
                // 生成唯一ID
                const newId = salesDeals.length > 0 ? Math.max(...salesDeals.map(deal => deal.id)) + 1 : 1;
                
                const newDeal = {
                    id: newId,
                    customerName: dealData.customerName,
                    amount: parseFloat(dealData.amount),
                    dealDate: new Date(dealData.dealDate).toISOString(),
                    salesPerson: dealData.salesPerson,
                    paymentStatus: dealData.paymentStatus || 'pending',
                    leadId: dealData.leadId
                };
                
                // 添加到数组
                salesDeals.push(newDeal);
                
                // 保存到本地存储
                localStorage.setItem('salesDeals', JSON.stringify(salesDeals));
                
                return newDeal;
            } catch (error) {
                console.error('添加成交记录失败:', error);
                throw error;
            }
        }
        
        // 查看成交记录
        function viewDeal(id) {
            try {
